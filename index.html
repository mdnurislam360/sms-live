<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>HE Live - Video Chat</title>

<script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f0f2f5;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ===== Header ===== */
.header{
  background:linear-gradient(135deg,#e91e63,#c2185b);
  color:#fff;
  padding:15px;
  font-weight:bold;
  text-align:center;
}

/* ===== Grid ===== */
.stream-grid{
  flex:1;
  overflow:auto;
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  background:#000;
  border-radius:12px;
  position:relative;
  aspect-ratio:3/4;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.live{
  position:absolute;
  top:6px;
  left:6px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:4px;
}

.name{
  position:absolute;
  bottom:0;
  width:100%;
  color:#fff;
  padding:6px;
  font-size:12px;
  background:linear-gradient(transparent,rgba(0,0,0,.9));
}

/* ===== Bottom Button ===== */
.startBtn{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  width:65px;
  height:65px;
  border-radius:50%;
  background:#e91e63;
  color:#fff;
  font-size:28px;
  border:none;
  cursor:pointer;
}

/* ===== Zego container ===== */
#zego-container{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  background:#000;
  display:none;
  z-index:9999;
}

/* ===== End button ===== */
.endBtn{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  color:#fff;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:22px;
  display:none;
  z-index:10000;
}
</style>
</head>

<body>

<div class="header">HE Live</div>

<div class="stream-grid" id="grid"></div>

<button class="startBtn" onclick="startCall()">📹</button>

<div id="zego-container"></div>

<button class="endBtn" id="endBtn" onclick="endCall()">❌</button>


<script>
/* ===== Sample users ===== */
const users=[
  {name:"Sumi",img:"https://i.pravatar.cc/300?1"},
  {name:"Rahim",img:"https://i.pravatar.cc/300?2"},
  {name:"Nila",img:"https://i.pravatar.cc/300?3"},
  {name:"Rafi",img:"https://i.pravatar.cc/300?4"},
  {name:"Sonia",img:"https://i.pravatar.cc/300?5"},
  {name:"Tanvir",img:"https://i.pravatar.cc/300?6"}
];

const grid=document.getElementById("grid");

users.forEach(u=>{
  const d=document.createElement("div");
  d.className="card";
  d.innerHTML=`
    <img src="${u.img}">
    <div class="live">LIVE</div>
    <div class="name">${u.name}</div>
  `;
  d.onclick=startCall;
  grid.appendChild(d);
});


/* ===== Zego Config ===== */
const appID=1772319407;
const serverSecret="353697f466f6b8372143a31f9c19d8d9";

let zp=null;

function randomID(){
  return Math.floor(Math.random()*100000)+"";
}

/* ===== Start Call ===== */
async function startCall(){

  const roomID=randomID();
  const userID=randomID();
  const userName="User_"+userID;

  const token=
    ZegoUIKitPrebuilt.generateKitTokenForTest(
      appID,
      serverSecret,
      roomID,
      userID,
      userName
    );

  zp=ZegoUIKitPrebuilt.create(token);

  document.getElementById("grid").style.display="none";
  document.querySelector(".header").style.display="none";
  document.querySelector(".startBtn").style.display="none";

  document.getElementById("zego-container").style.display="block";
  document.getElementById("endBtn").style.display="block";

  zp.joinRoom({
    container:document.getElementById("zego-container"),

    scenario:{
      mode:ZegoUIKitPrebuilt.VideoConference
    },

    turnOnCameraWhenJoining:true,
    turnOnMicrophoneWhenJoining:true,
    showTextChat:true,
    showUserList:true
  });
}

/* ===== End Call ===== */
function endCall(){
  if(zp){
    zp.destroy();
    zp=null;
  }

  document.getElementById("grid").style.display="grid";
  document.querySelector(".header").style.display="block";
  document.querySelector(".startBtn").style.display="block";

  document.getElementById("zego-container").style.display="none";
  document.getElementById("endBtn").style.display="none";
}
</script>

</body>
</html>

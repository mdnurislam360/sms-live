<script>
const appID = 1772319407;
const serverSecret = "353697f466f6b8372143a31f9c19d8d9";

let zp=null;

function randomID(){
  return Math.floor(Math.random()*100000)+"";
}

async function startZegoCall(){

  const roomID =
    document.getElementById("roomInput").value || randomID();

  const userID = randomID();
  const userName = "User_"+userID;

  closeRoomModal();
  document.getElementById("loadingOverlay").style.display="flex";

  try{

    const token =
      ZegoUIKitPrebuilt.generateKitTokenForTest(
        appID,
        serverSecret,
        roomID,
        userID,
        userName
      );

    zp = ZegoUIKitPrebuilt.create(token);

    // show full screen
    document.getElementById("zego-container").style.display="block";
    document.getElementById("streamGrid").style.display="none";
    document.querySelector(".header").style.display="none";
    document.querySelector(".bottom-nav").style.display="none";
    document.getElementById("loadingOverlay").style.display="none";

    await zp.joinRoom({
      container: document.getElementById("zego-container"),

      scenario:{
        mode: ZegoUIKitPrebuilt.OneONoneCall   // GitHub এ বেশি stable
      },

      turnOnCameraWhenJoining:true,
      turnOnMicrophoneWhenJoining:true,
      showTextChat:true,
      showUserList:true
    });

  }catch(e){
    alert("Join fail ❌");
    console.log(e);
  }
}

function endZegoCall(){
  if(zp){
    zp.destroy();
    zp=null;
  }
  showHome();
}
</script>
